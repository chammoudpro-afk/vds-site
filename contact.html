<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Valley Data Solutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <ul>
        <li><img src="logo-light.png" alt="Valley Data Solutions logo" class="logo"></li>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="services.html">Services & Pricing</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="class.html" class="cta">Free AI Class</a></li>
    </ul>
</nav>

<header>
    <h1>Contact Us</h1>
    <p>Tell us what you’re working on. We’ll help you make it smoother.</p>
</header>

<section class="form-section">
    <form name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    <p>© 2026 Valley Data Solutions.</p>
</footer>
<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');

hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    navLinks.classList.toggle('active');
});
</script>

</body>
</html>
