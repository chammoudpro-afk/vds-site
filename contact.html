<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Valley Data Solutions</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        :root {
            --cream: #E3D9C8;
            --green-dark: #1F2A22;
            --green-deep: #2E3D32;
        }

        body {
            background: var(--green-dark);
            color: var(--cream);
        }

        /* --- HERO --- */
        .hero {
            background: linear-gradient(180deg, var(--green-deep) 0%, var(--green-dark) 100%);
            padding: 100px 20px 60px; /* slightly tighter bottom */
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--cream);
        }

        .hero p {
            max-width: 650px;
            margin: 0 auto 20px; /* NEW: tighter spacing below subtitle */
            font-size: 1.25rem;
            line-height: 1.6;
        }

        /* --- CONTACT FORM SECTION --- */
        .contact-section {
            padding: 50px 20px; /* NEW: tighter top spacing */
            max-width: 700px;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--cream); /* NEW: cream labels */
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: none;
            background: var(--cream);
            color: var(--green-deep);
            font-size: 1rem;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        button {
            background: var(--cream);
            color: var(--green-deep);
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #d8cdbb;
        }

        /* --- FOOTER --- */
        footer {
            background: var(--green-dark);
            color: var(--cream);
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <nav>
        <div class="nav-left">
            <img src="logo-light.png" class="logo" alt="Valley Data Solutions">

            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div id="overlay"></div>

    <div class="full-menu" id="full-menu">
        <div class="menu-header">
            <img src="logo-light.png" class="logo" alt="Valley Data Solutions">
            <button class="close-menu" id="close-menu">×</button>
        </div>

        <ul class="menu-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
	    <li><a href="class.html">Class</a></li>
            <li><a href="contact.html" class="cta">Contact</a></li>
        </ul>

        <div class="menu-footer">
            <p>Social</p>
            <a href="#">LinkedIn</a>
            <a href="#">Facebook</a>
            <a href="mailto:info@valleydatasolutions.com">Email</a>
        </div>
    </div>

    <!-- HERO -->
    <section class="hero">
        <h1>Get in Touch</h1>
        <p>
            Let's do this thing, we are so excited to get to know you.
        </p>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-section">
        <form action="/api/contact" method="POST">

            <div>
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email">Your Email</label>
                <input type="email" id="email" name="_replyto" required>
            </div>

            <div>
                <label for="message">How can we help?</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Valley Data Solutions — Linden, VA</p>
    </footer>

    <!-- JS FOR MENU -->
    <script>
        const hamburger = document.getElementById('hamburger');
        const fullMenu = document.getElementById('full-menu');
        const overlay = document.getElementById('overlay');
        const closeMenu = document.getElementById('close-menu');

        function openMenu() {
            hamburger.classList.add('active');
            fullMenu.classList.add('active');
            overlay.classList.add('active');
        }

        function closeMenuFn() {
            hamburger.classList.remove('active');
            fullMenu.classList.remove('active');
            overlay.classList.remove('active');
        }

        hamburger.addEventListener('click', openMenu);
        closeMenu.addEventListener('click', closeMenuFn);
        overlay.addEventListener('click', closeMenuFn);
    </script>

</body>
</html>
